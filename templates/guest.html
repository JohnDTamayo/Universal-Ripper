            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 2.5em;
            margin-bottom: 30px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: var(--text-muted);
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-size: 1em;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.3);
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--gold-gradient);
            color: #0d1117;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            filter: brightness(1.1);
        }
        button:active {
            transform: translateY(0);
        }
        .queue-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #30363d;
        }
        .queue-item:last-child {
            border-bottom: none;
        }
        .song-details {
            display: flex;
            flex-direction: column;
        }
        .song-title {
            font-weight: 600;
        }
        .song-artist {
            font-size: 0.85em;
            color: var(--text-muted);
        }
        .status-selected .song-title {
            color: var(--success);
        }
        .status-skipped .song-title, .status-skipped .song-artist {
            text-decoration: line-through;
            color: var(--text-muted);
        }
        .star {
            color: #e3b341;
            font-size: 1.2em;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--success);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
            text-align: center;
            font-weight: 700;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="toast" id="toast">Request Sent!</div>
    <div class="container">
        <h1>Request a Song</h1>
        <div class="card">
            <form id="requestForm">
                <div class="form-group">
                    <label for="song">Song Title</label>
                    <input type="text" id="song" required placeholder="e.g. One More Time">
                </div>
                <div class="form-group">
                    <label for="artist">Artist</label>
                    <input type="text" id="artist" required placeholder="e.g. Daft Punk">
                </div>
                <button type="submit">Submit Request</button>
            </form>
        </div>

        <h2>Live Queue</h2>
        <div class="card" id="queueContainer">
            <!-- Queue items will be loaded here -->
        </div>
    </div>

    <script>
        // Set this to your Ngrok URL (e.g., 'https://random-id.ngrok-free.app')
        // Leave it as an empty string if the backend is on the same domain
        const API_BASE_URL = 'https://secluded-usual-trusting.ngrok-free.dev'; 

        document.getElementById('requestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const artist = document.getElementById('artist').value;
            const song = document.getElementById('song').value;

            const formData = new FormData();
            formData.append('artist', artist);
            formData.append('song', song);

            try {
                await fetch(`${API_BASE_URL}/api/request`, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'ngrok-skip-browser-warning': 'true'
                    }
                });
                
                document.getElementById('artist').value = '';
                document.getElementById('song').value = '';
                
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
                
                fetchQueue();
            } catch (error) {
                console.error('Error submitting request:', error);
            }
        });

        async function fetchQueue() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/queue`, {
                    headers: {
                        'ngrok-skip-browser-warning': 'true'
                    }
                });
                const queue = await response.json();
                
                const container = document.getElementById('queueContainer');
                container.innerHTML = '';
                
                if (queue.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color: var(--text-muted);">No requests yet.</div>';
                    return;
                }

                queue.forEach(item => {
                    const div = document.createElement('div');
                    div.className = `queue-item status-${item.status}`;
                    
                    let statusIcon = '';
                    if (item.status === 'selected') {
                        statusIcon = '<span class="star">⭐</span>';
                    }

                    div.innerHTML = `
                        <div class="song-details">
                            <span class="song-title">${item.song} ${statusIcon}</span>
                            <span class="song-artist">${item.artist}</span>
                        </div>
                        <span style="font-size: 0.8em; color: var(--text-muted);">${item.status}</span>
                    `;
                    container.appendChild(div);
                });
            } catch (error) {
                console.error('Error fetching queue:', error);
            }
        }

        // Poll queue every 3 seconds
        setInterval(fetchQueue, 3000);
        fetchQueue();
    </script>
</body>
</html>
